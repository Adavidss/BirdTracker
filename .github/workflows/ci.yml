name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check pipeline tests
      - name: Mypy (types)
        run: mypy pipeline
      - name: Pytest
        # All tests are offline — no EBIRD_API_KEY needed.
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        # npm install, not npm ci: tolerates optional-dep lockfile mismatches
        # between the npm that wrote the lock and the runner's npm.
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        # Builds green with an empty public/data/ — loaders tolerate 404s and
        # there are no dynamic segments.
        run: npm run build
